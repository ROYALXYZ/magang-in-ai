services:
  magangin-ai:
    build: .
    container_name: magangin-ai
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - TF_CPP_MIN_LOG_LEVEL=2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
